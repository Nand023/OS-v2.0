<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Técnando</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #000;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-card {
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .btn-login {
            background: #000;
            color: #fff;
            width: 100%;
            font-weight: bold;
            border-radius: 8px;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: #333;
            color: #fff;
        }

        .btn-register {
            background: #f8f9fa;
            color: #333;
            width: 100%;
            font-weight: bold;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-top: 10px;
        }

        .btn-register:hover {
            background: #e2e6ea;
        }

        .logo-login {
            width: 100px;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 3px solid #f0f0f0;
        }
    </style>
</head>

<body>
    <div class="login-card shadow-lg">
        <h3 class="fw-bold mb-2">TÉCNANDO</h3>
        <p class="text-muted small mb-4">Gestão de Assistência Técnica</p>

        <form action="/login" method="POST">
            <div class="mb-3 text-start">
                <label class="form-label small fw-bold text-secondary">USUÁRIO</label>
                <input type="text" name="usuario" class="form-control form-control-lg" placeholder="Seu usuário"
                    required autofocus>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label small fw-bold text-secondary">SENHA</label>
                <input type="password" name="senha" class="form-control form-control-lg" placeholder="••••••••"
                    required>
            </div>

            <button type="submit" class="btn btn-login py-3 mb-3">ENTRAR NO SISTEMA</button>

            <div class="position-relative my-4">
                <hr class="text-muted">
                <span
                    class="position-absolute top-50 start-50 translate-middle bg-white px-2 small text-muted">OU</span>
            </div>

            <a href="/registrar" class="btn btn-btn-register py-2 text-decoration-none d-block">CRIAR NOVO ACESSO</a>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <script>
      {% for category, message in messages %}
        Swal.fire({
          title: "{{ 'Sucesso' if category == 'success' else 'Atenção' }}",
          text: "{{ message }}",
          icon: "{{ category }}", 
          confirmButtonColor: '#3085d6'
        });
      {% endfor %}
    </script>
  {% endif %}
{% endwith %}
</body>

</html>
